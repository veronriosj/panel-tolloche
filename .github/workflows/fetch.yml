- name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git stash || true
          git pull --rebase origin main
          git stash pop || true
          git add data/geoagris.json data/historial.json data/msforms.json data/riego_ft.json || true
          git diff --staged --quiet || git commit -m "Update data $(date -u '+%H:%M UTC')"
          git push
